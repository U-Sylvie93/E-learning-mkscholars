name: Deploy Laravel Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, fileinfo, gd, intl, zip
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Prepare Laravel directories on GitHub runner
        run: |
          set -e

          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/testing
          mkdir -p storage/logs

          touch bootstrap/cache/.gitkeep
          touch storage/framework/cache/.gitkeep
          touch storage/framework/sessions/.gitkeep
          touch storage/framework/views/.gitkeep
          touch storage/framework/testing/.gitkeep
          touch storage/logs/.gitkeep

          chmod -R 775 bootstrap/cache storage

      - name: Install PHP dependencies
        run: |
          set -e
          composer install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Install Node dependencies
        run: |
          set -e
          npm install

      - name: Build frontend assets
        run: |
          set -e
          npm run build

      - name: Check required deployment secrets
        run: |
          set -e

          test -n "${{ secrets.HOSTINGER_HOST }}" || (echo "HOSTINGER_HOST is missing" && exit 1)
          test -n "${{ secrets.HOSTINGER_USER }}" || (echo "HOSTINGER_USER is missing" && exit 1)
          test -n "${{ secrets.HOSTINGER_PORT }}" || (echo "HOSTINGER_PORT is missing" && exit 1)
          test -n "${{ secrets.HOSTINGER_PATH }}" || (echo "HOSTINGER_PATH is missing" && exit 1)
          test -n "${{ secrets.HOSTINGER_SSH_KEY }}" || (echo "HOSTINGER_SSH_KEY is missing" && exit 1)

      - name: Prepare SSH key
        run: |
          set -e

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

          ssh-keyscan -p "${{ secrets.HOSTINGER_PORT }}" "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Validate SSH private key format
        run: |
          set -e

          ssh-keygen -y -f ~/.ssh/hostinger_key > ~/.ssh/hostinger_key.pub
          echo "SSH private key format is valid."

      - name: Test SSH connection
        run: |
          set -e

          ssh -i ~/.ssh/hostinger_key -p "${{ secrets.HOSTINGER_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "echo 'SSH connection successful' && pwd && php -v && composer --version || true"

      - name: Upload files to Hostinger
        run: |
          set -e

          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".env" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude="storage/app/*" \
            --exclude="storage/logs/*" \
            --exclude="storage/framework/cache/*" \
            --exclude="storage/framework/sessions/*" \
            --exclude="storage/framework/views/*" \
            --exclude="storage/framework/testing/*" \
            -e "ssh -i ~/.ssh/hostinger_key -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}

      - name: Run Laravel deployment commands on Hostinger
        run: |
          set -e

          ssh -i ~/.ssh/hostinger_key -p "${{ secrets.HOSTINGER_PORT }}" \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
              set -e

              cd "${{ secrets.HOSTINGER_PATH }}"

              mkdir -p bootstrap/cache
              mkdir -p storage/framework/cache
              mkdir -p storage/framework/sessions
              mkdir -p storage/framework/views
              mkdir -p storage/framework/testing
              mkdir -p storage/logs

              chmod -R 775 bootstrap/cache storage

              if [ ! -f ".env" ]; then
                echo "ERROR: .env file is missing on Hostinger."
                echo "Create the production .env file manually on Hostinger before deploying."
                exit 1
              fi

              composer install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader

              php artisan migrate --force
              php artisan storage:link || true

              php artisan optimize:clear
              php artisan config:cache
              php artisan view:cache

              chmod -R 775 storage bootstrap/cache

              echo "Deployment completed successfully."
            EOF