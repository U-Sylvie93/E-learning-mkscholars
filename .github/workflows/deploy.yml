name: Deploy Laravel Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, fileinfo, gd, intl, zip
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare Laravel directories
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/testing
          mkdir -p storage/logs

          touch bootstrap/cache/.gitkeep
          touch storage/framework/cache/.gitkeep
          touch storage/framework/sessions/.gitkeep
          touch storage/framework/views/.gitkeep
          touch storage/framework/testing/.gitkeep
          touch storage/logs/.gitkeep

          chmod -R 775 bootstrap/cache storage

      - name: Install PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          ssh-keyscan -p "${{ secrets.HOSTINGER_PORT }}" "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload files to Hostinger
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".env" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude="storage/app/*" \
            --exclude="storage/logs/*" \
            --exclude="storage/framework/cache/*" \
            --exclude="storage/framework/sessions/*" \
            --exclude="storage/framework/views/*" \
            --exclude="storage/framework/testing/*" \
            -e "ssh -i ~/.ssh/hostinger_key -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}

      - name: Run Laravel deployment commands
        run: |
          ssh -i ~/.ssh/hostinger_key -p "${{ secrets.HOSTINGER_PORT }}" \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
              set -e

              cd "${{ secrets.HOSTINGER_PATH }}"

              mkdir -p bootstrap/cache
              mkdir -p storage/framework/cache
              mkdir -p storage/framework/sessions
              mkdir -p storage/framework/views
              mkdir -p storage/framework/testing
              mkdir -p storage/logs

              chmod -R 775 bootstrap/cache storage

              composer install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader

              php artisan migrate --force
              php artisan storage:link || true

              php artisan optimize:clear
              php artisan config:cache
              php artisan view:cache

              chmod -R 775 storage bootstrap/cache
            EOF