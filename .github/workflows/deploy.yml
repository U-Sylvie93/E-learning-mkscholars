name: Deploy Laravel Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, fileinfo, gd, intl, zip
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Prepare Laravel directories on GitHub runner
        run: |
          set -e

          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/testing
          mkdir -p storage/logs

          touch bootstrap/cache/.gitkeep
          touch storage/framework/cache/.gitkeep
          touch storage/framework/sessions/.gitkeep
          touch storage/framework/views/.gitkeep
          touch storage/framework/testing/.gitkeep
          touch storage/logs/.gitkeep

          chmod -R 775 bootstrap/cache storage

      - name: Install PHP dependencies
        run: |
          set -e
          composer install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Install Node dependencies
        run: |
          set -e
          npm install

      - name: Build frontend assets
        run: |
          set -e
          npm run build

      - name: Check required deployment secrets
        run: |
          set -e

          test -n "${{ secrets.HOSTINGER_HOST }}" || (echo "HOSTINGER_HOST is missing" && exit 1)
          test -n "${{ secrets.HOSTINGER_USER }}" || (echo "HOSTINGER_USER is missing" && exit 1)
          test -n "${{ secrets.HOSTINGER_PORT }}" || (echo "HOSTINGER_PORT is missing" && exit 1)
          test -n "${{ secrets.HOSTINGER_APP_PATH }}" || (echo "HOSTINGER_APP_PATH is missing" && exit 1)
          test -n "${{ secrets.HOSTINGER_PUBLIC_PATH }}" || (echo "HOSTINGER_PUBLIC_PATH is missing" && exit 1)
          test -n "${{ secrets.HOSTINGER_SSH_KEY }}" || (echo "HOSTINGER_SSH_KEY is missing" && exit 1)

      - name: Prepare SSH key
        run: |
          set -e

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Validate SSH private key format
        run: |
          set -e

          ssh-keygen -y -f ~/.ssh/hostinger_key > ~/.ssh/hostinger_key.pub
          echo "SSH private key format is valid."

      - name: Test SSH connection
        run: |
          set -e

          ssh -i ~/.ssh/hostinger_key -p "${{ secrets.HOSTINGER_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=accept-new \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "echo 'SSH connection successful' && pwd && php -v && composer --version || true"

      - name: Upload Laravel app files to private app folder
        run: |
          set -e

          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".env" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude="public/build" \
            --exclude="storage/app/*" \
            --exclude="storage/logs/*" \
            --exclude="storage/framework/cache/*" \
            --exclude="storage/framework/sessions/*" \
            --exclude="storage/framework/views/*" \
            --exclude="storage/framework/testing/*" \
            -e "ssh -i ~/.ssh/hostinger_key -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=accept-new" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_APP_PATH }}

      - name: Upload Laravel public files to public_html
        run: |
          set -e

          rsync -az --delete \
            --exclude="storage" \
            -e "ssh -i ~/.ssh/hostinger_key -p ${{ secrets.HOSTINGER_PORT }} -o StrictHostKeyChecking=accept-new" \
            public/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PUBLIC_PATH }}

      - name: Create remote Laravel deployment script
        run: |
          set -e

          cat > /tmp/hostinger_laravel_deploy.sh <<'REMOTE_SCRIPT'
          #!/usr/bin/env bash
          set -e

          APP_PATH="$HOSTINGER_APP_PATH"
          PUBLIC_PATH="$HOSTINGER_PUBLIC_PATH"

          cd "$APP_PATH"

          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/testing
          mkdir -p storage/logs
          mkdir -p storage/app/public

          chmod -R 775 bootstrap/cache storage

          if [ ! -f ".env" ]; then
            echo "ERROR: .env file is missing in Laravel app folder:"
            echo "$APP_PATH/.env"
            echo "Copy/create production .env there before deploying."
            exit 1
          fi

          PHP_BIN=""

          if command -v php8.4 >/dev/null 2>&1; then
            PHP_BIN="$(command -v php8.4)"
          elif [ -x "/usr/bin/php8.4" ]; then
            PHP_BIN="/usr/bin/php8.4"
          elif [ -x "/usr/local/bin/php8.4" ]; then
            PHP_BIN="/usr/local/bin/php8.4"
          elif [ -x "/opt/alt/php84/usr/bin/php" ]; then
            PHP_BIN="/opt/alt/php84/usr/bin/php"
          elif [ -x "/usr/local/php8.4/bin/php" ]; then
            PHP_BIN="/usr/local/php8.4/bin/php"
          else
            echo "ERROR: PHP 8.4 binary was not found on Hostinger SSH."
            php -v || true
            ls /usr/bin/php* 2>/dev/null || true
            ls /usr/local/bin/php* 2>/dev/null || true
            ls /opt/alt/php*/usr/bin/php 2>/dev/null || true
            exit 1
          fi

          echo "Using PHP binary: $PHP_BIN"
          "$PHP_BIN" -v

          if command -v composer >/dev/null 2>&1; then
            COMPOSER_BIN="$(command -v composer)"
          elif [ -f "composer.phar" ]; then
            COMPOSER_BIN="composer.phar"
          else
            echo "ERROR: Composer was not found on Hostinger."
            exit 1
          fi

          if [ "$COMPOSER_BIN" = "composer.phar" ]; then
            "$PHP_BIN" composer.phar install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader
          else
            "$PHP_BIN" "$COMPOSER_BIN" install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader
          fi

          cat > "$PUBLIC_PATH/index.php" <<PHP
          <?php

          use Illuminate\Foundation\Application;
          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists(\$maintenance = '$APP_PATH/storage/framework/maintenance.php')) {
              require \$maintenance;
          }

          require '$APP_PATH/vendor/autoload.php';

          /** @var Application \$app */
          \$app = require_once '$APP_PATH/bootstrap/app.php';

          \$app->handleRequest(Request::capture());
          PHP

          rm -rf "$PUBLIC_PATH/storage"
          ln -s "$APP_PATH/storage/app/public" "$PUBLIC_PATH/storage"

          "$PHP_BIN" artisan migrate --force

          "$PHP_BIN" artisan optimize:clear
          "$PHP_BIN" artisan config:cache
          "$PHP_BIN" artisan view:cache

          chmod -R 775 "$APP_PATH/storage" "$APP_PATH/bootstrap/cache"

          echo "Deployment completed successfully."
          REMOTE_SCRIPT

          chmod +x /tmp/hostinger_laravel_deploy.sh

      - name: Upload remote deployment script
        run: |
          set -e

          scp -i ~/.ssh/hostinger_key -P "${{ secrets.HOSTINGER_PORT }}" \
            -o StrictHostKeyChecking=accept-new \
            /tmp/hostinger_laravel_deploy.sh \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:/tmp/hostinger_laravel_deploy_${{ github.run_id }}.sh

      - name: Run Laravel deployment commands on Hostinger
        run: |
          set -e

          ssh -i ~/.ssh/hostinger_key -p "${{ secrets.HOSTINGER_PORT }}" \
            -o StrictHostKeyChecking=accept-new \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "HOSTINGER_APP_PATH='${{ secrets.HOSTINGER_APP_PATH }}' HOSTINGER_PUBLIC_PATH='${{ secrets.HOSTINGER_PUBLIC_PATH }}' bash /tmp/hostinger_laravel_deploy_${{ github.run_id }}.sh"

      - name: Remove remote deployment script
        if: always()
        run: |
          timeout 20 ssh -i ~/.ssh/hostinger_key -p "${{ secrets.HOSTINGER_PORT }}" \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=10 \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "rm -f /tmp/hostinger_laravel_deploy_${{ github.run_id }}.sh" || true